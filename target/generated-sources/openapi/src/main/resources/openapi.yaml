components:
  schemas:
    CategoriaEquipamento:
      description: Categoria do equipamento
      enum:
      - IMPRESSORA
      - SCANNER
      - COPIADORA
      - MULTIFUNCIONAL
      - FAX
      - PROJETOR
      - MONITOR
      - COMPUTADOR
      - SERVIDOR
      - IMPRESSORA_3D
      - OUTRO
      type: string
    FabricanteRequestDTO:
      example:
        sigla: sigla
        nome: nome
      properties:
        nome:
          description: Nome do fabricante
          maxLength: 100
          minLength: 3
          type: string
        sigla:
          description: Sigla do fabricante
          maxLength: 5
          minLength: 2
          type: string
      required:
      - nome
      - sigla
      type: object
    FabricanteResponseDTO:
      example:
        sigla: sigla
        nome: nome
        id: 0
      properties:
        id:
          description: ID do fabricante
          format: int64
          type: integer
        nome:
          description: Nome do fabricante
          type: string
        sigla:
          description: Sigla do fabricante
          type: string
      type: object
    EquipamentoRequestDTO:
      example:
        tipo: tipo
        categoria: IMPRESSORA
        fabricanteId: 0
        modelo: modelo
      properties:
        modelo:
          description: Modelo do equipamento
          maxLength: 100
          minLength: 1
          type: string
        categoria:
          $ref: '#/components/schemas/CategoriaEquipamento'
        tipo:
          description: Tipo do equipamento
          maxLength: 50
          minLength: 1
          type: string
        fabricanteId:
          description: ID do fabricante
          format: int64
          type: integer
      required:
      - categoria
      - fabricanteId
      - modelo
      - tipo
      type: object
    EquipamentoResponseDTO:
      example:
        tipo: tipo
        categoria: IMPRESSORA
        id: 0
        fabricanteId: 6
        modelo: modelo
      properties:
        id:
          format: int64
          type: integer
        modelo:
          type: string
        categoria:
          $ref: '#/components/schemas/CategoriaEquipamento'
        tipo:
          type: string
        fabricanteId:
          format: int64
          type: integer
      type: object
    DicaRequestDTO:
      example:
        solucao: solucao
        equipamentoId: 0
        problema: problema
      properties:
        problema:
          description: Descrição do problema
          type: string
        solucao:
          description: Solução para o problema
          type: string
        equipamentoId:
          description: ID do equipamento
          format: int64
          type: integer
      required:
      - equipamentoId
      - problema
      - solucao
      type: object
    DicaResponseDTO:
      example:
        ativo: true
        solucao: solucao
        equipamentoId: 6
        dataAtualizacao: 2000-01-23T04:56:07.000+00:00
        problema: problema
        id: 0
        dataCriacao: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: int64
          type: integer
        problema:
          type: string
        solucao:
          type: string
        equipamentoId:
          format: int64
          type: integer
        dataCriacao:
          format: date-time
          type: string
        dataAtualizacao:
          format: date-time
          type: string
        ativo:
          type: boolean
      type: object
    PecaRequestDTO:
      example:
        equipamentoId: 0
        categoria: categoria
        nome: nome
        partNumber: partNumber
      properties:
        nome:
          description: Nome da peça
          type: string
        partNumber:
          description: Número da parte
          type: string
        categoria:
          description: Categoria da peça
          type: string
        equipamentoId:
          description: ID do equipamento
          format: int64
          type: integer
      required:
      - categoria
      - equipamentoId
      - nome
      - partNumber
      type: object
    PecaResponseDTO:
      example:
        equipamentoId: 6
        categoria: categoria
        nome: nome
        partNumber: partNumber
        id: 0
      properties:
        id:
          format: int64
          type: integer
        nome:
          type: string
        partNumber:
          type: string
        categoria:
          type: string
        equipamentoId:
          format: int64
          type: integer
      type: object
    PageFabricanteResponseDTO:
      example:
        totalPages: 1
        currentPage: 5
        content:
        - sigla: sigla
          nome: nome
          id: 0
        - sigla: sigla
          nome: nome
          id: 0
        totalElements: 6
      properties:
        content:
          items:
            $ref: '#/components/schemas/FabricanteResponseDTO'
          type: array
        totalElements:
          format: int64
          type: integer
        totalPages:
          type: integer
        currentPage:
          type: integer
      type: object
    PageEquipamentoResponseDTO:
      example:
